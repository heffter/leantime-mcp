#
# Deployment for leantime-mcp on a home NAS / LAN.
#
# Intended hostname for the deployed service: leantime.mcp.home.lan
# Container name: leantime-mcp (Docker disallows dots in container names).
#
# Hardening applied:
#   - read_only: the service writes nothing to disk
#   - cap_drop ALL: no Linux capabilities are required
#   - no-new-privileges: prevents setuid/file-cap escalation inside the container
#   - expose (not ports): container reachable only on its Docker network,
#     not on the host LAN. Reverse proxy (Caddy with bearer token) is
#     the only path in.
#
# The leantime_mcp_net network is declared external because it is shared
# with the reverse-proxy stack. The build-and-deploy.sh wrapper creates
# it before running compose if it doesn't exist (idempotent).

name: leantime-mcp

services:
  leantime-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Forward the build identity so get_version inside the running
        # container can report it. If you don't export these, the image
        # will report "unknown" - run with the wrapper invocation in the
        # README's Deployment section to populate them automatically.
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_DATE: ${GIT_COMMIT_DATE:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: leantime-mcp:local
    container_name: leantime-mcp
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - leantime_mcp_net
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  leantime_mcp_net:
    name: leantime_mcp_net
    external: true
